name: Build apps (macOS + Windows)

# Handmatig starten via Actions -> Run workflow, of automatisch bij een tag "v*".
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: mac
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # De bestanden mogen in de hoofdmap staan OF in een submap
      # (bv. PuntenlijstApp/): deze stap zoekt ze automatisch.
      # De assets-map (logo + iconen) wordt desnoods elders in de repo
      # gezocht en naar de juiste plek gekopieerd.
      - name: Zoek de app-bestanden
        run: |
          GUIFILE=$(find . -maxdepth 4 -name puntenlijst_gui.py -not -path "*/.*" | head -1)
          if [ -z "$GUIFILE" ]; then
            echo "FOUT: puntenlijst_gui.py nergens gevonden in de repository."
            exit 1
          fi
          SRC=$(dirname "$GUIFILE")
          echo "App-bestanden gevonden in: $SRC"
          if [ ! -d "$SRC/assets" ]; then
            ASSETS=$(find . -maxdepth 4 -type d -iname assets -not -path "*/.*" | head -1)
            if [ -n "$ASSETS" ]; then
              echo "assets-map gevonden op $ASSETS -> kopiëren naar $SRC/assets"
              cp -R "$ASSETS" "$SRC/assets"
            else
              echo "WAARSCHUWING: geen assets-map gevonden; app wordt gebouwd zonder logo en icoon."
            fi
          fi
          echo "--- Inhoud van $SRC: ---"
          ls -la "$SRC"
          if [ -d "$SRC/assets" ]; then
            echo "--- Inhoud van $SRC/assets: ---"
            ls -la "$SRC/assets"
          fi
          echo "SRC=$SRC" >> "$GITHUB_ENV"

      # pdfplumber wordt bewust ZONDER zijn optionele afhankelijkheden
      # geïnstalleerd (pillow en pypdfium2 zijn alleen nodig om PDF's als
      # afbeelding te renderen). Wat niet geïnstalleerd is, belandt ook
      # niet in de app: dat scheelt ~20 MB.
      - name: Install dependencies
        run: |
          cd "$SRC"
          python -m pip install --upgrade pip
          pip install --no-deps pdfplumber
          pip install "pdfminer.six" openpyxl tkinterdnd2 pyinstaller
          # Zelfcontrole: de build faalt meteen als de zware, onnodige
          # pakketten toch aanwezig zijn (dan draait een oude workflow).
          python -c "import importlib.util, sys; bad = [m for m in ('PIL', 'pypdfium2') if importlib.util.find_spec(m)]; sys.exit('FOUT: onnodige pakketten aanwezig: ' + ', '.join(bad)) if bad else print('Slanke omgeving OK: geen Pillow/pypdfium2')"

      - name: Build (macOS)
        if: matrix.name == 'mac'
        run: |
          cd "$SRC"
          VERSION=$(python -c "import version; print(version.__version__)")
          EXTRA=""
          if [ -f assets/icon.icns ]; then EXTRA="--icon assets/icon.icns"; fi
          if [ -d assets ]; then EXTRA="$EXTRA --add-data assets:assets"; fi
          pyinstaller --noconfirm --windowed --name "Puntenlijst" \
            $EXTRA \
            --collect-all tkinterdnd2 \
            --exclude-module PIL \
            --exclude-module pypdfium2 \
            --exclude-module pypdfium2_raw \
            puntenlijst_gui.py
          cd dist && ditto -c -k --keepParent "Puntenlijst.app" "Puntenlijst-mac-v$VERSION.zip"

      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: |
          cd "$SRC"
          VERSION=$(python -c "import version; print(version.__version__)")
          EXTRA=""
          if [ -f assets/icon.ico ]; then EXTRA="--icon assets/icon.ico"; fi
          if [ -d assets ]; then EXTRA="$EXTRA --add-data assets;assets"; fi
          pyinstaller --noconfirm --onefile --windowed --name "Puntenlijst" $EXTRA --collect-all tkinterdnd2 --exclude-module PIL --exclude-module pypdfium2 --exclude-module pypdfium2_raw puntenlijst_gui.py
          mv dist/Puntenlijst.exe "dist/Puntenlijst-v$VERSION.exe"

      - name: Upload artifact (macOS)
        if: matrix.name == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: Puntenlijst-mac
          path: ${{ env.SRC }}/dist/Puntenlijst-mac-v*.zip

      - name: Upload artifact (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Puntenlijst-windows
          path: ${{ env.SRC }}/dist/Puntenlijst-v*.exe

      - name: Release (macOS)
        if: startsWith(github.ref, 'refs/tags/') && matrix.name == 'mac'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SRC }}/dist/Puntenlijst-mac-v*.zip

      - name: Release (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.name == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SRC }}/dist/Puntenlijst-v*.exe
