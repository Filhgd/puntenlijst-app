name: Build apps (macOS + Windows)

# Handmatig starten via Actions -> Run workflow, of automatisch bij een tag "v*".
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: mac
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # De bestanden mogen in de hoofdmap staan OF in een submap
      # (bv. PuntenlijstApp/): deze stap zoekt ze automatisch.
      - name: Zoek de app-bestanden
        run: |
          FOUND=$(find . -maxdepth 3 -name requirements.txt -not -path "*/.*" | head -1)
          if [ -z "$FOUND" ]; then
            echo "FOUT: requirements.txt nergens gevonden in de repository."
            exit 1
          fi
          SRC=$(dirname "$FOUND")
          echo "App-bestanden gevonden in: $SRC"
          echo "SRC=$SRC" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          cd "$SRC"
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (macOS)
        if: matrix.name == 'mac'
        run: |
          cd "$SRC"
          pyinstaller --noconfirm --windowed --name "Puntenlijst" \
            --collect-all tkinterdnd2 \
            --collect-all pdfplumber \
            puntenlijst_gui.py
          cd dist && ditto -c -k --keepParent "Puntenlijst.app" "Puntenlijst-mac.zip"

      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: |
          cd "$SRC"
          pyinstaller --noconfirm --onefile --windowed --name "Puntenlijst" --collect-all tkinterdnd2 --collect-all pdfplumber puntenlijst_gui.py

      - name: Upload artifact (macOS)
        if: matrix.name == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: Puntenlijst-mac
          path: ${{ env.SRC }}/dist/Puntenlijst-mac.zip

      - name: Upload artifact (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Puntenlijst-windows
          path: ${{ env.SRC }}/dist/Puntenlijst.exe

      - name: Release (macOS)
        if: startsWith(github.ref, 'refs/tags/') && matrix.name == 'mac'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SRC }}/dist/Puntenlijst-mac.zip

      - name: Release (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.name == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SRC }}/dist/Puntenlijst.exe
